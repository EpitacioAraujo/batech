<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 160" width="720" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="160" rx="20" fill="#0b1220"/>

  <!-- Icon box -->
  <rect x="24" y="30" width="100" height="100" rx="21" fill="#141f38" stroke="#2c3b60" stroke-width="1.5"/>

  <!-- Infinity shadow stroke -->
  <path
    d="M38.5,80 C38.5,56 61,56 74,80 C87,104 109.5,104 109.5,80"
    fill="none"
    stroke="#f2b84b"
    stroke-opacity="0.4"
    stroke-width="9"
    stroke-linecap="round"
  />
  <!-- Infinity main stroke -->
  <path
    d="M38.5,80 C38.5,104 61,104 74,80 C87,56 109.5,56 109.5,80"
    fill="none"
    stroke="#f2b84b"
    stroke-width="9"
    stroke-linecap="round"
  />
  <!-- Center dot -->
  <circle cx="74" cy="80" r="4.5" fill="#141f38" stroke="#f2b84b" stroke-width="2"/>

  <!-- Brand name -->
  <text
    x="148"
    y="92"
    font-family="'Space Grotesk', 'Arial Black', sans-serif"
    font-weight="700"
    font-size="52"
    fill="#eaeef7"
    dominant-baseline="middle"
    letter-spacing="-1"
  >Belas Artes <tspan fill="#f2b84b">Tech</tspan></text>
</svg>
